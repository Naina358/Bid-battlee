<!DOCTYPE html>
<html>
<head>
  <title>BidBattle Live Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #1e1e2f, #2b5876);
      color: white;
      padding: 20px;
    }
    h1 { text-align:center; }
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background: rgba(255,255,255,0.05);
    }
    th, td {
      padding:10px;
      text-align:center;
      border:1px solid #ccc;
    }
    th { background:#000; }
    input, select { width:100%; padding:5px; }
    button {
      padding:10px;
      background:#00c6ff;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    .red { background:#ff4d4d; }
    .green { background:#4dff88; color:black; }
  </style>
</head>

<body>

<div style="display:flex; align-items:center; gap:10px;">
  <img src="logo.png" style="width:40px;">
  <h1>BidBattle Dashboard</h1>
</div>

<button onclick="addPlayer()">Add Player</button>

<table id="table">
<tr>
<th>Team</th><th>Player</th><th>Role</th><th>Price</th><th>Rating</th><th>Foreign</th>
</tr>
</table>

<h2>Summary</h2>
<table id="summary">
<tr>
<th>Team</th><th>Players</th><th>Spent</th><th>Remaining</th><th>Rating</th><th>Rank</th><th>Status</th>
</tr>
</table>

<div style="position:fixed; bottom:10px; right:10px; font-size:12px; opacity:0.5;">
Ansh Singh
</div>

<script>
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function addPlayer() {
  let row = document.getElementById("table").insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td>
      <select>
        <option>Batter</option>
        <option>Bowler</option>
        <option>All-Rounder</option>
        <option>Wicket Keeper</option>
      </select>
    </td>
    <td><input type="number"></td>
    <td><input type="number"></td>
    <td>
      <select><option>N</option><option>Y</option></select>
    </td>
    <td><button onclick="save(this)">Save</button></td>
  `;
}

function save(btn) {
  let row = btn.parentNode.parentNode;
  let data = {
    team: row.cells[0].children[0].value,
    player: row.cells[1].children[0].value,
    role: row.cells[2].children[0].value,
    price: Number(row.cells[3].children[0].value),
    rating: Number(row.cells[4].children[0].value),
    foreign: row.cells[5].children[0].value
  };
  db.ref("players").push(data);
}

db.ref("players").on("value", snap=>{
  let players = snap.val() || {};
  let teams = {};

  for(let id in players){
    let p = players[id];
    if(!teams[p.team]) teams[p.team]={players:0,spent:0,rating:0,roles:{},foreign:0};

    let t=teams[p.team];
    t.players++;
    t.spent+=p.price;
    t.rating+=p.rating;
    if(p.foreign==="Y") t.foreign++;
    t.roles[p.role]=(t.roles[p.role]||0)+1;
  }

  render(teams);
});

function render(teams){
  let table=document.getElementById("summary");
  table.innerHTML=table.rows[0].outerHTML;

  let sorted=Object.entries(teams).sort((a,b)=>b[1].rating-a[1].rating);

  sorted.forEach((t,i)=>{
    let d=t[1];
    let remaining=90-d.spent;
    let valid = d.roles["Batter"]>=3 && d.roles["Bowler"]>=3 && d.roles["All-Rounder"]>=1 && d.roles["Wicket Keeper"]>=1 && d.foreign<=4;

    let row=table.insertRow();
    row.innerHTML=`
      <td>${t[0]}</td>
      <td>${d.players}</td>
      <td>${d.spent}</td>
      <td class="${remaining<10?'red':''}">${remaining}</td>
      <td>${d.rating}</td>
      <td>${i+1}</td>
      <td class="${valid?'green':'red'}">${valid?'VALID':'INVALID'}</td>
    `;
  });
}
</script>

</body>
</html>
