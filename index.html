<!DOCTYPE html>
<html>
<head>
  <title>IPL Auction Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #1e1e2f, #2b5876);
      color: white;
      padding: 20px;
    }

    h1 { text-align:center; }

    .container {
      display:flex;
      gap:20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding:20px;
      border-radius:12px;
      flex:1;
    }

    input, select {
      width:100%;
      padding:8px;
      margin-top:5px;
      border-radius:5px;
      border:none;
    }

    button {
      padding:12px;
      margin-top:10px;
      width:100%;
      background:#00c6ff;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    table {
      width:100%;
      margin-top:10px;
      border-collapse:collapse;
    }

    th, td {
      padding:8px;
      text-align:center;
      border:1px solid #ccc;
    }

    .highlight {
      background:#00c6ff;
      color:black;
    }

    @keyframes pulse {
      0% { box-shadow:0 0 5px #00c6ff; }
      50% { box-shadow:0 0 20px #00c6ff; }
      100% { box-shadow:0 0 5px #00c6ff; }
    }

    .player-box {
      border:2px dashed #00c6ff;
      padding:15px;
      border-radius:10px;
      text-align:center;
      animation:pulse 1.5s infinite;
    }
  </style>
</head>

<body>

<h1>🏏 IPL Auction Dashboard</h1>

<div class="container">

  <!-- LEFT -->
  <div class="card">
    <h2>Current Player</h2>

    <div class="player-box">
      <h2 id="playerName">No Player</h2>
      <p id="playerRole">Role</p>
      <h3>₹ <span id="currentBid">0</span> Cr</h3>
    </div>

    <input id="teamInput" placeholder="Team Name">
    <input id="playerInput" placeholder="Player Name">

    <select id="roleInput">
      <option>Batter</option>
      <option>Bowler</option>
      <option>All-Rounder</option>
      <option>Wicket Keeper</option>
    </select>

    <input id="priceInput" type="number" placeholder="Bid Amount">
    <input id="ratingInput" type="number" placeholder="Rating">

    <select id="foreignInput">
      <option>N</option>
      <option>Y</option>
    </select>

    <button onclick="placeBid()">💰 Place Bid</button>
  </div>

  <!-- RIGHT -->
  <div class="card">
    <h2>Leaderboard</h2>
    <table id="summary">
      <tr>
        <th>Team</th>
        <th>Spent</th>
        <th>Rating</th>
        <th>Rank</th>
      </tr>
    </table>
  </div>

</div>

<audio id="hammer" src="https://www.soundjay.com/misc/sounds/gavel-01.mp3"></audio>

<script>

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function placeBid() {
  let data = {
    team: document.getElementById("teamInput").value,
    player: document.getElementById("playerInput").value,
    role: document.getElementById("roleInput").value,
    price: Number(document.getElementById("priceInput").value),
    rating: Number(document.getElementById("ratingInput").value),
    foreign: document.getElementById("foreignInput").value
  };

  document.getElementById("playerName").innerText = data.player;
  document.getElementById("playerRole").innerText = data.role;
  document.getElementById("currentBid").innerText = data.price;

  document.getElementById("hammer").play();

  db.ref("players").push(data);
}

db.ref("players").on("value", snapshot => {
  let players = snapshot.val() || {};
  let teams = {};

  for (let id in players) {
    let p = players[id];

    if (!teams[p.team]) {
      teams[p.team] = {spent:0, rating:0};
    }

    teams[p.team].spent += p.price;
    teams[p.team].rating += p.rating;
  }

  renderLeaderboard(teams);
});

function renderLeaderboard(teams) {
  let table = document.getElementById("summary");
  table.innerHTML = table.rows[0].outerHTML;

  let sorted = Object.entries(teams).sort((a,b)=>b[1].rating - a[1].rating);

  sorted.forEach((t,i)=>{
    let row = table.insertRow();

    if(i===0) row.classList.add("highlight");

    row.innerHTML = `
      <td>${t[0]}</td>
      <td>${t[1].spent}</td>
      <td>${t[1].rating}</td>
      <td>${i+1}</td>
    `;
  });
}

</script>

</body>
</html>
