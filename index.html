<!DOCTYPE html>
<html>
<head>
  <title>IPL Auction Dashboard</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      flex: 1;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      background: #00c6ff;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00c6ff;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #444;
    }

    th {
      background: rgba(0,0,0,0.5);
    }

    .highlight {
      background: #00c6ff;
      color: black;
      font-weight: bold;
    }

    .player-box {
      border: 2px solid #00c6ff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      animation: glow 1.5s infinite;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 5px #00c6ff; }
      50% { box-shadow: 0 0 20px #00c6ff; }
      100% { box-shadow: 0 0 5px #00c6ff; }
    }

    .watermark {
      position: fixed;
      bottom: 10px;
      right: 15px;
      opacity: 0.4;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1 id="title">🏏 IPL Auction Dashboard</h1>

<!-- 🌍 LANGUAGE -->
<select onchange="changeLang(this.value)">
  <option value="en">English</option>
  <option value="hi">Hindi</option>
</select>

<div class="container">

  <!-- 🎯 PLAYER PANEL -->
  <div class="card">
    <h2>🎯 Current Player</h2>

    <div class="player-box">
      <h2 id="playerName">No Player</h2>
      <p id="playerRole">Role</p>
      <h1>₹ <span id="currentBid">0</span> Cr</h1>
    </div>

    <input id="teamInput" placeholder="Team Name">
    <input id="playerInput" placeholder="Player Name">

    <select id="roleInput">
      <option>Batter</option>
      <option>Bowler</option>
      <option>All-Rounder</option>
      <option>Wicket Keeper</option>
    </select>

    <input id="priceInput" type="number" placeholder="Bid Amount">
    <input id="ratingInput" type="number" placeholder="Rating">

    <select id="foreignInput">
      <option>N</option>
      <option>Y</option>
    </select>

    <button onclick="placeBid()">💰 Place Bid</button>
  </div>

  <!-- 🏆 LEADERBOARD -->
  <div class="card">
    <h2>🏆 Leaderboard</h2>
    <table id="summary">
      <tr>
        <th>Team</th>
        <th>Spent</th>
        <th>Rating</th>
        <th>Rank</th>
      </tr>
    </table>
  </div>

</div>

<!-- 🔊 SOUND -->
<audio id="hammer" src="https://www.soundjay.com/misc/sounds/gavel-01.mp3"></audio>

<!-- 🪶 WATERMARK -->
<div class="watermark">Created by Ansh Singh</div>

<script>

const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function placeBid() {
  let data = {
    team: document.getElementById("teamInput").value,
    player: document.getElementById("playerInput").value,
    role: document.getElementById("roleInput").value,
    price: Number(document.getElementById("priceInput").value),
    rating: Number(document.getElementById("ratingInput").value),
    foreign: document.getElementById("foreignInput").value
  };

  document.getElementById("playerName").innerText = data.player;
  document.getElementById("playerRole").innerText = data.role;
  document.getElementById("currentBid").innerText = data.price;

  document.getElementById("hammer").play();

  db.ref("players").push(data);
}

db.ref("players").on("value", snapshot => {
  let players = snapshot.val() || {};
  let teams = {};

  for (let id in players) {
    let p = players[id];

    if (!teams[p.team]) {
      teams[p.team] = {spent:0, rating:0};
    }

    teams[p.team].spent += p.price;
    teams[p.team].rating += p.rating;
  }

  renderLeaderboard(teams);
});

function renderLeaderboard(teams) {
  let table = document.getElementById("summary");
  table.innerHTML = table.rows[0].outerHTML;

  let sorted = Object.entries(teams).sort((a,b)=>b[1].rating - a[1].rating);

  sorted.forEach((t,i)=>{
    let row = table.insertRow();

    if(i === 0) row.classList.add("highlight");

    row.innerHTML = `
      <td>${t[0]}</td>
      <td>${t[1].spent}</td>
      <td>${t[1].rating}</td>
      <td>${i+1}</td>
    `;
  });
}

function changeLang(lang) {
  if (lang === "hi") {
    document.getElementById("title").innerText = "🏏 आईपीएल नीलामी डैशबोर्ड";
  } else {
    document.getElementById("title").innerText = "🏏 IPL Auction Dashboard";
  }
}

</script>

</body>
</html>
